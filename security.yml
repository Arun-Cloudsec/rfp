# .github/workflows/security.yml
#
# TEMPORARY: Inline security scans with non-blocking gates.
# Scans still run and findings are uploaded to the Security tab,
# but failures do NOT block deploys while remediation is in progress.
#
# To restore the org-canonical strict pipeline, replace the contents
# of this file with:
#
#   jobs:
#     security:
#       uses: Arun-Cloudsec/.github/.github/workflows/reusable-security.yml@main
#       with:
#         language: javascript
#         scan-container: true
#       secrets: inherit

name: Security CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL — javascript
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  dependencies:
    name: Dependencies — javascript
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit (informational)
        run: npm audit --audit-level=critical || true

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'   # do not fail the step on findings

      - name: Ensure SARIF exists
        if: always()
        run: |
          if [ ! -s trivy-fs.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[]}' > trivy-fs.sarif
          fi

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: Container — Trivy image
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found — skipping image scan."
          fi

      - name: Set up Docker Buildx
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        if: steps.dockerfile.outputs.exists == 'true'
        run: docker build -t local/scan:${{ github.sha }} .

      - name: Trivy image scan
        if: steps.dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: local/scan:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'   # do not fail the step on findings

      - name: Ensure SARIF exists
        if: always() && steps.dockerfile.outputs.exists == 'true'
        run: |
          if [ ! -s trivy-image.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[]}' > trivy-image.sarif
          fi

      - name: Upload SARIF
        if: always() && steps.dockerfile.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
